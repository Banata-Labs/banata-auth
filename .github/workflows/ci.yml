name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Require changeset for package changes
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED_FILES="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -qE '^packages/'; then
            if ! echo "$CHANGED_FILES" | grep -qE '^\.changeset\/[^/]+\.md$'; then
              echo "Package changes detected without a changeset file."
              echo "Add a .changeset/*.md entry before merging."
              exit 1
            fi
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build packages
        run: bun run build --filter='./packages/*'
